<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Tempahan Kain</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 { font-size: 28px; color: #e8c178; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 14px; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }
  .top-bar a {
    color: #e8c178;
    text-decoration: none;
    font-size: 14px;
    padding: 8px 16px;
    border: 1px solid #e8c178;
    border-radius: 8px;
  }
  .refresh-btn {
    background: #e8c178;
    color: #1a1a2e;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }
  .refresh-btn:hover { background: #d4af37; }
  .stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #16213e;
    padding: 16px 20px;
    border-radius: 12px;
    min-width: 140px;
    flex: 1;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #e8c178; }
  .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
  .table-wrap {
    overflow-x: auto;
    background: #16213e;
    border-radius: 12px;
    padding: 4px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 900px;
  }
  th {
    background: #0f3460;
    color: #e8c178;
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
    font-weight: 600;
    font-size: 12px;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid #1a1a3e;
    vertical-align: middle;
  }
  tr:hover { background: #1a1a40; }
  .order-id { color: #e8c178; font-weight: 600; font-family: monospace; }
  .slip-thumb {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #333;
    display: block;
  }
  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-pending { background: #3a2e00; color: #f0c040; }
  .status-confirmed { background: #003a1f; color: #40f080; }
  .status-rejected { background: #3a0010; color: #f04060; }
  .actions { white-space: nowrap; }
  .actions button {
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    margin: 0 2px;
  }
  .btn-confirm { background: #2ecc71; color: #fff; }
  .btn-confirm:hover { background: #27ae60; }
  .btn-reject { background: #e74c3c; color: #fff; }
  .btn-reject:hover { background: #c0392b; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .error-msg { text-align: center; padding: 40px; color: #e74c3c; }

  /* Modal for slip image */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .modal .close {
    position: absolute;
    top: 20px;
    right: 30px;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    opacity: 0.7;
  }
  .modal .close:hover { opacity: 1; }

  @media (max-width: 768px) {
    body { padding: 12px; }
    .stats .stat-card { min-width: 100px; }
    th, td { padding: 8px; font-size: 12px; }
  }
</style>
</head>
<body>

<h1>🛡️ Admin Dashboard</h1>
<p class="subtitle">Urus tempahan kain — Wanita IKRAM Negeri Perak</p>

<div class="top-bar">
  <div>
    <a href="kain-order-form.html">← Kembali ke Borang</a>
  </div>
  <button class="refresh-btn" onclick="fetchOrders()">🔄 Muat Semula</button>
</div>

<div class="stats" id="statsRow"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Tarikh</th>
        <th>Nama</th>
        <th>Telefon</th>
        <th>Kawasan</th>
        <th>Item</th>
        <th>Saiz</th>
        <th>Qty</th>
        <th>Jumlah</th>
        <th>Resit</th>
        <th>Status</th>
        <th>Tindakan</th>
      </tr>
    </thead>
    <tbody id="ordersBody"></tbody>
  </table>
</div>

<div id="loading" class="loading">⏳ Memuatkan data...</div>

<!-- Slip Modal -->
<div class="modal" id="slipModal" onclick="this.classList.remove('show')">
  <span class="close">&times;</span>
  <img id="slipImg" src="" alt="Slip Resit">
</div>

<script>
const SHEET_ID = '1wgXM33U_-9moC1qyrJpEoeWdlU4XEwaN0tB9UlPFt1g';
const API_KEY = '';

async function fetchOrders() {
  const loading = document.getElementById('loading');
  const tbody = document.getElementById('ordersBody');
  loading.style.display = 'block';
  tbody.innerHTML = '';

  try {
    // Fetch from published Google Sheet as CSV (no header row in sheet)
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&tq=&sheet=${encodeURIComponent('Sheet1')}`;
    const resp = await fetch(url, { cache: 'no-store' });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const csvText = await resp.text();
    const rows = parseCSV(csvText);

    if (rows.length === 0) {
      loading.innerHTML = '📭 Tiada data tempahan.';
      document.getElementById('statsRow').innerHTML = '';
      return;
    }

    renderTable(rows);
    renderStats(rows);
    loading.style.display = 'none';
  } catch (e) {
    console.error(e);
    loading.innerHTML = `❌ Gagal muat data: ${e.message}. <button onclick="fetchOrders()" style="background:#e8c178;color:#1a1a2e;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;margin-top:12px;">Cuba Lagi</button>`;
  }
}

function parseCSV(text) {
  // Standard CSV parser handling quoted fields with commas, newlines, and escaped quotes
  const result = [];
  let row = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    
    if (inQuotes) {
      if (ch === '"') {
        if (i + 1 < text.length && text[i + 1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = false;
        }
      } else {
        current += ch;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
      } else if (ch === ',') {
        row.push(current.trim());
        current = '';
      } else if (ch === '\n') {
        row.push(current.trim());
        current = '';
        if (row.length > 0 && row.some(f => f)) {
          result.push(row);
        }
        row = [];
      } else if (ch === '\r') {
        // skip — handled by \n
      } else {
        current += ch;
      }
    }
  }
  
  // Handle last row if any
  if (current.trim() || row.length > 0) {
    row.push(current.trim());
    if (row.length > 0 && row.some(f => f !== '')) {
      result.push(row);
    }
  }
  
  return result;
}

function renderTable(rows) {
  const tbody = document.getElementById('ordersBody');
  // All rows are data — no header row
  const data = rows;
  const statusMap = loadStatusMap();

  tbody.innerHTML = data.map((row, idx) => {
    // Support both old format (KAIN- prefix in col 0) and old data (date in col 0)
    const orderId = (row[0] || '').startsWith('KAIN-') ? row[0] : `LEGACY-${idx + 1}`;
    const tarikh = row[1] || '-';
    const nama = row[2] || '-';
    const phone = row[3] || '-';
    const kawasan = row[4] || '-';
    const item = row[5] || '-';
    const saiz = row[6] || '-';
    const qty = row[7] || '-';
    const jumlah = row[8] || '-';
    const slipBase64 = row[9] || '';

    const savedStatus = statusMap[orderId] || 'pending';
    const statusBadge = savedStatus === 'confirmed' ? 'status-confirmed' : savedStatus === 'rejected' ? 'status-rejected' : 'status-pending';
    const statusLabel = savedStatus === 'confirmed' ? '✅ Siap' : savedStatus === 'rejected' ? '❌ Tolak' : '⏳ Baru';

    let slipHtml;
    if (slipBase64 && slipBase64.length > 20) {
      slipHtml = `<img class="slip-thumb" src="data:image/jpeg;base64,${slipBase64}" onclick="showSlip('data:image/jpeg;base64,${slipBase64}')" alt="Resit">`;
    } else if (slipBase64 && slipBase64.startsWith('http')) {
      slipHtml = `<img class="slip-thumb" src="${slipBase64}" onclick="showSlip('${slipBase64}')" alt="Resit">`;
    } else if (slipBase64 && slipBase64.length > 5) {
      slipHtml = `<span style="font-size:11px;color:#888;">📎 Ada</span>`;
    } else {
      slipHtml = `<span style="font-size:11px;color:#555;">—</span>`;
    }

    return `<tr>
      <td class="order-id">${orderId}</td>
      <td>${tarikh}</td>
      <td><strong>${nama}</strong></td>
      <td>${phone}</td>
      <td>${kawasan}</td>
      <td>${item}</td>
      <td>${saiz}</td>
      <td style="text-align:center;">${qty}</td>
      <td><strong>RM${jumlah}</strong></td>
      <td>${slipHtml}</td>
      <td><span class="status-badge ${statusBadge}">${statusLabel}</span></td>
      <td class="actions">
        <button class="btn-confirm" onclick="updateStatus('${orderId}','confirmed')" ${savedStatus === 'confirmed' ? 'disabled' : ''}>✅ Siap</button>
        <button class="btn-reject" onclick="updateStatus('${orderId}','rejected')" ${savedStatus === 'rejected' ? 'disabled' : ''}>❌ Tolak</button>
      </td>
    </tr>`;
  }).join('');
}

function renderStats(rows) {
  const data = rows;
  const statusMap = loadStatusMap();
  const total = data.length;
  const pending = Object.values(statusMap).filter(s => s === 'pending').length;
  const confirmed = Object.values(statusMap).filter(s => s === 'confirmed').length;
  const rejected = Object.values(statusMap).filter(s => s === 'rejected').length;

  // Count unique order IDs
  const uniqueIds = new Set(data.map(r => r[0]));
  const uniqueCount = uniqueIds.size;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${uniqueCount}</div><div class="label">📦 Tempahan</div></div>
    <div class="stat-card"><div class="num">${data.length}</div><div class="label">📋 Baris Item</div></div>
    <div class="stat-card"><div class="num" style="color:#f0c040;">${pending}</div><div class="label">⏳ Baru</div></div>
    <div class="stat-card"><div class="num" style="color:#40f080;">${confirmed}</div><div class="label">✅ Siap</div></div>
    <div class="stat-card"><div class="num" style="color:#f04060;">${rejected}</div><div class="label">❌ Tolak</div></div>
  `;
}

function showSlip(src) {
  document.getElementById('slipImg').src = src;
  document.getElementById('slipModal').classList.add('show');
}

function loadStatusMap() {
  try {
    return JSON.parse(localStorage.getItem('orderStatuses') || '{}');
  } catch { return {}; }
}

function saveStatusMap(map) {
  localStorage.setItem('orderStatuses', JSON.stringify(map));
}

function updateStatus(orderId, status) {
  const map = loadStatusMap();
  map[orderId] = status;
  saveStatusMap(map);
  fetchOrders();
  showToast(`✅ Order ${orderId} — ${status === 'confirmed' ? 'Siap' : 'Ditolak'}`);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)',
    background: '#2d2a24', color: '#e8c178', padding: '12px 24px',
    borderRadius: '12px', fontWeight: '600', fontSize: '14px', zIndex: '99999',
    boxShadow: '0 4px 16px rgba(0,0,0,0.3)', transition: 'opacity 0.3s'
  });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

// Auto-load on page load
fetchOrders();
</script>
</body>
</html>
